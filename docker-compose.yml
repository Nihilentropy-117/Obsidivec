services:
  vaultkeeper:
    build: .
    ports:
      - "41795:8000"
    volumes:
      # Mount your Obsidian vault (read/write)
      - ./Vault:/vault
      # Persistent storage for ChromaDB index
      - ./vaultkeeper-data:/data/chromadb
    environment:
      - VAULTKEEPER_TOKEN=${VAULTKEEPER_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - VAULTKEEPER_CONFIG=/etc/vaultkeeper/config.yml
    restart: unless-stopped
