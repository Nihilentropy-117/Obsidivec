services:
  vaultkeeper:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount your Obsidian vault (read/write)
      - ${VAULT_PATH:?Set VAULT_PATH to your Obsidian vault directory}:/vault
      # Persistent storage for ChromaDB index
      - ./vaultkeeper-data:/data/chromadb
      # Config file
      - ./config.yml:/etc/vaultkeeper/config.yml:ro
    environment:
      - VAULTKEEPER_TOKEN=${VAULTKEEPER_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - VAULTKEEPER_CONFIG=/etc/vaultkeeper/config.yml
    restart: unless-stopped
